<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Drowsiness Detection Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, Segoe UI, Roboto, sans-serif;
    background: #0f172a;
    color: #e2e8f0;
    padding: 20px;
    min-height: 100vh;
  }
  .container { max-width: 1200px; margin: 0 auto; }
  header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
    padding-bottom: 15px;
    border-bottom: 1px solid #334155;
  }
  header h1 { font-size: 24px; font-weight: 600; }
  .connection {
    font-size: 13px;
    padding: 6px 12px;
    border-radius: 20px;
    background: #1e293b;
  }
  .connection.live { background: #064e3b; color: #6ee7b7; }
  .connection.stale { background: #7f1d1d; color: #fca5a5; }

  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 20px;
  }
  .card {
    background: #1e293b;
    border-radius: 10px;
    padding: 20px;
    border: 1px solid #334155;
  }
  .card h2 { font-size: 14px; color: #94a3b8; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.5px; }

  .status-card {
    grid-column: 1 / -1;
    text-align: center;
    padding: 40px 20px;
    transition: background 0.3s;
  }
  .status-card.awake { background: linear-gradient(135deg, #064e3b, #065f46); border-color: #10b981; }
  .status-card.drowsy { background: linear-gradient(135deg, #7f1d1d, #991b1b); border-color: #ef4444; animation: pulse 1s infinite; }
  .status-card.no-data { background: #1e293b; }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.85; }
  }

  .status-text {
    font-size: 72px;
    font-weight: 700;
    letter-spacing: 2px;
    margin-bottom: 10px;
  }
  .status-reasons {
    font-size: 16px;
    color: rgba(255,255,255,0.8);
    min-height: 22px;
  }

  .metrics-row {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 15px;
    margin-bottom: 20px;
  }
  .metric {
    background: #1e293b;
    border-radius: 8px;
    padding: 15px;
    text-align: center;
    border: 1px solid #334155;
  }
  .metric-label { font-size: 11px; color: #94a3b8; text-transform: uppercase; margin-bottom: 6px; letter-spacing: 0.5px; }
  .metric-value { font-size: 28px; font-weight: 600; color: #f1f5f9; }
  .metric-value.warn { color: #fbbf24; }
  .metric-value.danger { color: #ef4444; }

  #chart-container { height: 280px; position: relative; }

  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th {
    text-align: left;
    padding: 8px 10px;
    font-weight: 500;
    color: #94a3b8;
    border-bottom: 1px solid #334155;
    text-transform: uppercase;
    font-size: 11px;
    letter-spacing: 0.5px;
  }
  td { padding: 8px 10px; border-bottom: 1px solid #293548; }
  .pill {
    display: inline-block;
    padding: 2px 10px;
    border-radius: 12px;
    font-size: 11px;
    font-weight: 600;
  }
  .pill.awake { background: #064e3b; color: #6ee7b7; }
  .pill.drowsy { background: #7f1d1d; color: #fca5a5; }

  .table-card { grid-column: 1 / -1; }
  .table-wrap { max-height: 300px; overflow-y: auto; }

  footer { margin-top: 20px; text-align: center; font-size: 12px; color: #64748b; }
</style>
</head>
<body>
<div class="container">

  <header>
    <h1>Drowsiness Detection Dashboard</h1>
    <div id="connection" class="connection">Connecting...</div>
  </header>

  <!-- Big status badge -->
  <div class="card status-card no-data" id="statusCard">
    <div class="status-text" id="statusText">--</div>
    <div class="status-reasons" id="statusReasons">Waiting for sensor data...</div>
  </div>

  <!-- Metric strip -->
  <div class="metrics-row">
    <div class="metric">
      <div class="metric-label">EAR</div>
      <div class="metric-value" id="mEar">--</div>
    </div>
    <div class="metric">
      <div class="metric-label">MAR</div>
      <div class="metric-value" id="mMar">--</div>
    </div>
    <div class="metric">
      <div class="metric-label">Head pitch</div>
      <div class="metric-value" id="mPitch">--</div>
    </div>
    <div class="metric">
      <div class="metric-label">Drowsy events</div>
      <div class="metric-value" id="mDrowsy">0</div>
    </div>
    <div class="metric">
      <div class="metric-label">Yawn events</div>
      <div class="metric-value" id="mYawn">0</div>
    </div>
  </div>

  <!-- Charts and recent events -->
  <div class="grid">
    <div class="card">
      <h2>EAR over time</h2>
      <div id="chart-container">
        <canvas id="earChart"></canvas>
      </div>
    </div>
    <div class="card">
      <h2>MAR over time</h2>
      <div id="chart-container">
        <canvas id="marChart"></canvas>
      </div>
    </div>
    <div class="card table-card">
      <h2>Recent events</h2>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Time</th>
              <th>Status</th>
              <th>Reasons</th>
              <th>EAR</th>
              <th>MAR</th>
              <th>Pitch</th>
            </tr>
          </thead>
          <tbody id="eventsTable">
            <tr><td colspan="6" style="text-align:center; color:#64748b; padding:20px;">No events yet</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <footer>
    Polling every 1.5s &middot; Fog & Edge Cloud Project
  </footer>
</div>

<script>
const POLL_INTERVAL_MS = 1500;
const MAX_CHART_POINTS = 40;

// Chart setup
const earCtx = document.getElementById('earChart').getContext('2d');
const marCtx = document.getElementById('marChart').getContext('2d');

const chartOptions = {
  responsive: true,
  maintainAspectRatio: false,
  animation: false,
  plugins: { legend: { display: false } },
  scales: {
    x: { ticks: { color: '#64748b', maxTicksLimit: 6 }, grid: { color: '#293548' } },
    y: { ticks: { color: '#64748b' }, grid: { color: '#293548' }, beginAtZero: true }
  }
};

const earChart = new Chart(earCtx, {
  type: 'line',
  data: {
    labels: [],
    datasets: [{
      data: [],
      borderColor: '#3b82f6',
      backgroundColor: 'rgba(59,130,246,0.15)',
      borderWidth: 2,
      fill: true,
      tension: 0.3,
      pointRadius: 0
    }]
  },
  options: {
    ...chartOptions,
    scales: {
      ...chartOptions.scales,
      y: { ...chartOptions.scales.y, suggestedMax: 0.4 }
    }
  }
});

const marChart = new Chart(marCtx, {
  type: 'line',
  data: {
    labels: [],
    datasets: [{
      data: [],
      borderColor: '#f59e0b',
      backgroundColor: 'rgba(245,158,11,0.15)',
      borderWidth: 2,
      fill: true,
      tension: 0.3,
      pointRadius: 0
    }]
  },
  options: {
    ...chartOptions,
    scales: {
      ...chartOptions.scales,
      y: { ...chartOptions.scales.y, suggestedMax: 1.0 }
    }
  }
});

let lastSeenId = 0;
let lastUpdateTime = Date.now();

function formatTime(unixTs) {
  const d = new Date(unixTs * 1000);
  return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
}

function updateStatus(latest) {
  const card = document.getElementById('statusCard');
  const text = document.getElementById('statusText');
  const reasons = document.getElementById('statusReasons');

  card.classList.remove('awake', 'drowsy', 'no-data');

  if (!latest) {
    card.classList.add('no-data');
    text.textContent = '--';
    reasons.textContent = 'Waiting for sensor data...';
    return;
  }

  if (latest.status === 'DROWSY') {
    card.classList.add('drowsy');
    text.textContent = 'DROWSY';
    reasons.textContent = latest.reasons && latest.reasons.length
      ? 'Reason: ' + latest.reasons.join(', ')
      : 'Drowsiness detected';
  } else {
    card.classList.add('awake');
    text.textContent = 'AWAKE';
    reasons.textContent = 'All metrics within normal range';
  }
}

function updateMetrics(latest) {
  if (!latest) return;

  const ear = latest.ear != null ? latest.ear.toFixed(3) : '--';
  const mar = latest.mar != null ? latest.mar.toFixed(3) : '--';
  const pitch = latest.head_pitch != null ? latest.head_pitch.toFixed(1) : '--';

  document.getElementById('mEar').textContent = ear;
  document.getElementById('mMar').textContent = mar;
  document.getElementById('mPitch').textContent = pitch;
  document.getElementById('mDrowsy').textContent = latest.drowsy_events || 0;
  document.getElementById('mYawn').textContent = latest.yawn_events || 0;

  // Colour-code the metrics
  const earEl = document.getElementById('mEar');
  earEl.classList.remove('warn', 'danger');
  if (latest.ear != null && latest.ear < 0.22) earEl.classList.add('danger');
  else if (latest.ear != null && latest.ear < 0.26) earEl.classList.add('warn');

  const marEl = document.getElementById('mMar');
  marEl.classList.remove('warn', 'danger');
  if (latest.mar != null && latest.mar > 0.6) marEl.classList.add('danger');
  else if (latest.mar != null && latest.mar > 0.45) marEl.classList.add('warn');
}

function updateCharts(events) {
  const recent = events.slice(-MAX_CHART_POINTS);
  const labels = recent.map(e => formatTime(e.timestamp));
  const earData = recent.map(e => e.ear);
  const marData = recent.map(e => e.mar);

  earChart.data.labels = labels;
  earChart.data.datasets[0].data = earData;
  earChart.update();

  marChart.data.labels = labels;
  marChart.data.datasets[0].data = marData;
  marChart.update();
}

function updateTable(events) {
  const tbody = document.getElementById('eventsTable');
  if (!events.length) {
    tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; color:#64748b; padding:20px;">No events yet</td></tr>';
    return;
  }

  // Show the 15 most recent events, newest first
  const recent = [...events].reverse().slice(0, 15);
  tbody.innerHTML = recent.map(e => {
    const pillClass = e.status === 'DROWSY' ? 'pill drowsy' : 'pill awake';
    const reasons = (e.reasons && e.reasons.length) ? e.reasons.join(', ') : '-';
    return `
      <tr>
        <td>${formatTime(e.timestamp)}</td>
        <td><span class="${pillClass}">${e.status}</span></td>
        <td>${reasons}</td>
        <td>${e.ear != null ? e.ear.toFixed(3) : '-'}</td>
        <td>${e.mar != null ? e.mar.toFixed(3) : '-'}</td>
        <td>${e.head_pitch != null ? e.head_pitch.toFixed(1) : '-'}</td>
      </tr>
    `;
  }).join('');
}

function updateConnection(isLive) {
  const el = document.getElementById('connection');
  el.classList.remove('live', 'stale');
  if (isLive) {
    el.classList.add('live');
    el.textContent = '● Live';
  } else {
    el.classList.add('stale');
    el.textContent = '● No recent data';
  }
}

async function poll() {
  try {
    const res = await fetch('/events?limit=50');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    const events = data.events || [];

    if (events.length) {
      const latest = events[events.length - 1];
      updateStatus(latest);
      updateMetrics(latest);
      updateCharts(events);
      updateTable(events);

      if (latest.id !== lastSeenId) {
        lastSeenId = latest.id;
        lastUpdateTime = Date.now();
      }
    }

    // Mark connection as stale if no new data in 10 seconds
    const ageMs = Date.now() - lastUpdateTime;
    updateConnection(ageMs < 10000 && events.length > 0);

  } catch (e) {
    console.error('Poll failed:', e);
    updateConnection(false);
  }
}

// Start polling
poll();
setInterval(poll, POLL_INTERVAL_MS);
</script>
</body>
</html>
